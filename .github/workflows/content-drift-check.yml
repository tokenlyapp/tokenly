name: Content drift check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.json'
      - '**/*.toml'
      - '**/*.xml'
      - '.github/workflows/content-drift-check.yml'
      - 'scripts/audit-content-claims.mjs'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.html'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.json'
      - '**/*.toml'
      - '**/*.xml'
      - '.github/workflows/content-drift-check.yml'
      - 'scripts/audit-content-claims.mjs'
  workflow_dispatch:

jobs:
  content-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tokenly app repo
        uses: actions/checkout@v4
        with:
          path: tokenly

      - name: Check out marketing site repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tokenlyapp/tokenly-site
          path: tokenly-site
          token: ${{ secrets.TOKENLY_CONTENT_AUDIT_TOKEN || github.token }}

      - name: Check out launch docs repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tokenlyapp/tokenly-launch
          path: tokenly-launch
          token: ${{ secrets.TOKENLY_CONTENT_AUDIT_TOKEN || github.token }}

      - name: Run Tokenly content-claim drift scan
        run: |
          node tokenly/scripts/audit-content-claims.mjs
        env:
          TOKENLY_APP_REPO: ${{ github.workspace }}/tokenly
          TOKENLY_SITE_REPO: ${{ github.workspace }}/tokenly-site
          TOKENLY_LAUNCH_REPO: ${{ github.workspace }}/tokenly-launch
          TOKENLY_AUDIT_REPORT: ${{ github.workspace }}/tokenly_content_claim_scan.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokenly-content-claim-scan
          path: tokenly_content_claim_scan.json
          if-no-files-found: ignore
